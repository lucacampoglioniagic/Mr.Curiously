name: Daily Post

on:
  schedule:
    - cron: '0 9 * * *'   # ogni giorno alle 09:00 UTC (11:00 ora italiana)
  workflow_dispatch:        # permette lancio manuale dal pannello Actions

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install fonts
        run: sudo apt-get install -y fonts-dejavu fonts-liberation

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          IG_USER_ID:           ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:      ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USERNAME:          ${{ secrets.IG_USERNAME }}
          META_APP_ID:          ${{ secrets.META_APP_ID }}
          META_APP_SECRET:      ${{ secrets.META_APP_SECRET }}
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY:        ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY:        ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL:        ${{ secrets.R2_PUBLIC_URL }}
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.cli run
